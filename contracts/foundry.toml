[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
skip = ["lib/openzeppelin-contracts/fv/**", "lib/openzeppelin-contracts/test/**", "lib/openzeppelin-contracts/contracts/mocks/**"]

[fmt]
line_length = 110
int_types = "long"
bracket_spacing = false